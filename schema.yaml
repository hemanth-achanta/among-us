  hive.mstr_tables.doc_consult_session_attribution:
    description: Session-level funnel and attribution data for consultation booking journeys.
      Created daily from page load events, widget interactions, and order placement events.
      Tracks user progression through consultation funnel steps (homepage, speciality selection,
      doctor selection, patient info, slot selection, payment, order placement). Contains
      comma-separated order_ids linking sessions to orders. Used for funnel analysis,
      conversion optimization, traffic source analysis, widget performance tracking, and
      session-to-order attribution. Critical for understanding user journey and identifying
      conversion bottlenecks.
    layer: raw
    subject: sessions
    columns:
      session_id:
        type: VARCHAR
        description: Unique identifier for each user session. Primary key for session-level
          analysis. Used to join with consult_start_update_session_level for customer_id
          and digi_flag in RCA analysis. Referenced across funnel analysis queries.
      session_date:
        type: DATE
        description: Date on which the session occurred. Used for date-based filtering
          and aggregations. Always filter on dt (partition column) for performance, but
          session_date provides the actual session date.
      session_start_ts:
        type: TIMESTAMP(3)
        description: Timestamp marking the start of the session. Used to calculate time_to_first_step
          and time_to_order metrics. Referenced from consult_start_update_session_level.created_at.
      platform:
        type: VARCHAR
        description: Device platform used for the session (e.g., 'android', 'ios', 'web',
          'mweb'). Mapped to order_source format in daily mailer (iOS_App, Android_App,
          Mobile_Website, Website). Used extensively in funnel analysis for platform
          breakdowns. Filtered in daily mailer sessions query (platform IN ('ios', 'android',
          'mweb', 'web')).
      session_source:
        type: VARCHAR
        description: Traffic source or channel through which the session originated (e.g.,
          'Organic', 'Paid', campaign names). Used in RCA analysis and funnel reports
          for traffic source performance. Critical for marketing attribution analysis.
      first_source_page_name:
        type: VARCHAR
        description: Name of the first page viewed in the session (e.g., 'p_splash').
          Used in daily mailer sessions query for landing page analysis. Derived from
          page_load_snapshot_nrt or consult_start_update_session_level.landing_page_name.
      city:
        type: VARCHAR
        description: City location of the user during the session. Derived from selected_city
          in session base or first_load_city from page loads. Used for geographic analysis
          in funnel reports.
      pincode:
        type: VARCHAR
        description: Postal code of the user's location. Derived from selected_pincode
          in session base or first_load_pincode from page loads. Used for location-based
          analysis.
      first_consult_page:
        type: VARCHAR
        description: First consultation-related page accessed in the session (e.g., 'doc_consult_hp',
          'speciality_selection_hp', 'doctor_selection_hp', 'patient_info_hp', 'slot_selection',
          'payment_method'). Used in funnel analysis to understand entry points. Derived
          from first page in funnel sequence.
      first_landing_from:
        type: VARCHAR
        description: Referrer or source of the first landing page. Used in RCA analysis
          for traffic source attribution. Derived from source_page_name of first consult
          page.
      reached_doc_consult_hp:
        type: INTEGER
        description: Flag indicating if user reached the doctor consultation homepage (1=yes,
          0=no). First step in funnel. Used in funnel analysis to calculate drop-off
          rates. Aggregated in RCA sheet for funnel step analysis.
      reached_speciality_selection_hp:
        type: INTEGER
        description: Flag indicating if user reached the speciality selection page (1=yes,
          0=no). Second step in funnel. Used in funnel analysis and RCA reports.
      reached_doctor_selection_hp:
        type: INTEGER
        description: Flag indicating if user reached the doctor selection page (1=yes,
          0=no). Third step in funnel. Used in funnel analysis and RCA reports.
      reached_patient_info_hp:
        type: INTEGER
        description: Flag indicating if user reached the patient information page (1=yes,
          0=no). Fourth step in funnel. Used in funnel analysis and RCA reports.
      reached_slot_selection:
        type: INTEGER
        description: Flag indicating if user reached the appointment slot selection page
          (1=yes, 0=no). Fifth step in funnel. Used in funnel analysis and RCA reports.
          Critical step before payment.
      reached_payment_method:
        type: INTEGER
        description: Flag indicating if user reached the payment method selection page
          (1=yes, 0=no). Sixth step in funnel. Used in daily mailer sessions query to
          count payment_sessions. Critical conversion step.
      reached_order_placed:
        type: INTEGER
        description: Flag indicating if user completed and placed an order (1=yes, 0=no).
          Final step in funnel. Derived from order placement events (c_placed_order_snapshot_nrt).
          Used in daily mailer sessions query to count order_sessions. Critical for conversion
          rate calculations.
      max_funnel_step:
        type: INTEGER
        description: Highest step reached in the consultation booking funnel (0-7, where
          7 = order placed). Used in daily mailer sessions query to identify consult_sessions
          (max_funnel_step > 0). Used in RCA analysis for funnel progression analysis.
          Calculated as greatest of all reached_* flags.
      time_to_first_step:
        type: BIGINT
        description: Time in milliseconds from session start to reaching the first funnel
          step. Used for engagement analysis. NULL if user never reached first step.
          Calculated as unix_timestamp(first_funnel_ts) - unix_timestamp(session_start_ts).
      time_to_order:
        type: BIGINT
        description: Time in milliseconds from session start to order placement. Used
          for conversion time analysis. NULL if no order placed. Calculated as unix_timestamp(first_order_ts)
          - unix_timestamp(session_start_ts).
      total_pageviews:
        type: INTEGER
        description: Total number of pages viewed during the session. Used for engagement
          analysis. Derived from page_load_snapshot_nrt count.
      funnel_pageviews:
        type: INTEGER
        description: Number of pages viewed within the consultation funnel. Used for
          funnel engagement analysis. Counts pages in funnel sequence (doc_consult_hp,
          speciality_selection_hp, etc.).
      order_ids:
        type: VARCHAR
        description: Comma-separated list of order IDs generated from the session. Critical
          for joining with doc_consult_orders - requires CROSS JOIN UNNEST(SPLIT(order_ids,
          ',')) or CONTAINS(SPLIT(order_ids, ','), order_id) pattern. Used in RCA analysis
          to link sessions with orders. Derived from c_placed_order_snapshot_nrt events
          aggregated by session.
      widget_source:
        type: VARCHAR
        description: Source or type of widget that initiated the session (e.g., 'Doctor
          by health concern', 'First Fold Strip', 'Tile', 'Primary Banner - New Users',
          'Primary Banner - Old Users'). Identifies first clicked widget. Used in widget
          performance analysis and attribution.
      viewed_health_concern:
        type: INTEGER
        description: Count of health concern items viewed by the user. Used for widget
          engagement analysis. Derived from i_element_viewed_snapshot_nrt for 'doc_consult_concerns'
          element.
      clicked_health_concern:
        type: INTEGER
        description: Count of health concern items clicked by the user. Used for widget
          engagement and conversion analysis. Derived from element_clicked_snapshot_nrt.
      viewed_first_fold:
        type: INTEGER
        description: Count of first-fold content items viewed by the user. Used for
          widget engagement analysis. Derived from 'doc_con_hp_strip' element views.
      clicked_first_fold:
        type: INTEGER
        description: Count of first-fold content items clicked by the user. Used for
          widget conversion analysis.
      viewed_tile:
        type: INTEGER
        description: Count of tile-based content items viewed by the user. Used for
          widget engagement analysis. Derived from 'home_cards' with specific image_url.
      clicked_tile:
        type: INTEGER
        description: Count of tile-based content items clicked by the user. Used for
          widget conversion analysis.
      viewed_banner_new:
        type: INTEGER
        description: Count of new banner designs viewed by the user. Used for widget
          engagement analysis. Derived from 'home_banners_primary' with item_id = '15031'.
      clicked_banner_new:
        type: INTEGER
        description: Count of new banner designs clicked by the user. Used for widget
          conversion analysis.
      viewed_banner_old:
        type: INTEGER
        description: Count of old banner designs viewed by the user. Used for widget
          engagement analysis. Derived from 'home_banners_primary' with item_id = '15030'.
      clicked_banner_old:
        type: INTEGER
        description: Count of old banner designs clicked by the user. Used for widget
          conversion analysis.
      dt:
        type: DATE
        description: Partition date for the table record. Always filter on this column
          for query performance. Used in all queries for date-based filtering (typically
          dt >= date_sub(current_date, 3) or dt >= trunc(add_months(current_date, -N),
          'MM')).
