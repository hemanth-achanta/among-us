tables:
  hive.data_model.doc_consult_orders:
    description: Raw order-level data for consultation orders. Created daily from OMS snapshots
      and enriched with customer cohort attributes (registration status, loyalty, pharma/diag
      history, user activity segments). Used as the primary source for order-level analysis,
      RCA investigations, cross-sell analysis (pharma/diag), and detailed cancellation analysis.
      Contains both placed and fulfilled pricing metrics, doctor/patient demographics, and
      consultation slot details.
      Business rule (order_created_flag). If order_created_flag = '1' is not present for an
      order, that order is one for which payment was never triggered. By default, exclude
      such orders from all analyses (i.e. filter to order_created_flag = '1'). Only include
      them when the user explicitly asks to include pre-payment orders or to remove that filter.
    layer: raw
    subject: consultations
    columns:
      order_id:
        type: VARCHAR
        description: Unique identifier for the consultation order. Used as primary key for
          joins with metrics table and session attribution (via comma-separated order_ids).
          Referenced in cross-sell analysis to link consultations with subsequent pharma/diag
          orders.
      parent_id:
        type: INTEGER
        description: Parent order identifier linking to the main transaction. Used in base_query.sql
          to join with parent_order_price_snapshot for child order status determination.
      order_placed_at:
        type: TIMESTAMP(3)
        description: Timestamp when the consultation order was placed. Used in cross-sell
          analysis to identify pharma orders placed after consultation (within 2 days of slot_end_time).
          Filtered in daily mailer reports for time-based aggregations.
      order_placed_date:
        type: DATE
        description: Date when the consultation order was placed. Used for date-based filtering
          and aggregations in dashboards. Joined with fod_lod_growth_cohort on snapshot_month
          for customer type classification.
      customer_id:
        type: VARCHAR
        description: Unique identifier for the customer placing the order. Primary join key
          for customer segmentation tables (clevertap_user_properties_oms, fod_lod_growth_cohort).
          Used in cross-sell analysis to link consultations with subsequent pharma orders.
          Filtered for cohort analysis (New vs Old users, activity segments).
      order_source:
        type: VARCHAR
        description: Channel through which the order was placed (e.g., Mobile_Website,
          Android_App, iOS_App, Website). Mapped from origin_platform in base_query.sql.
          Used in funnel reports and dashboards for channel breakdowns. Aggregated in
          metrics table for multi-dimensional analysis.
      attributes_vertical:
        type: VARCHAR
        description: Product vertical for the order, always 'CONSULTATION' for this table.
          Used as filter in base_query.sql to extract consultation orders from parent_order_snapshot.
      order_status:
        type: VARCHAR
        description: Current status of the order (e.g., COMPLETED, CANCELLED). Used in
          metrics aggregation to count completed_consult_orders vs cancelled_consult_orders.
          Filtered in RCA analysis and cross-sell queries (typically where order_status = 'COMPLETED').
          Critical for calculating conversion rates and fulfillment metrics.
      delivered_date:
        type: DATE
        description: Date when the consultation was completed or delivered. Derived from
          CHILD_ORDER_COMPLETED snapshot in base_query.sql. Used in cross-sell analysis to
          identify time window for subsequent pharma orders (within 2 days of delivery).
          NULL for cancelled orders.
      placed_mrp:
        type: DOUBLE
        description: Maximum retail price at the time of order placement. Aggregated as
          SUM(placed_mrp) in metrics table and dashboards. Used in daily mailer reports
          for revenue analysis. Filtered in cross-sell analysis (excluding free/followup orders).
      placed_discounted_mrp:
        type: DOUBLE
        description: Discounted price charged to customer at order placement. Used to
          classify order_category (Free when = 0, Paid when > 0). Aggregated in metrics
          for revenue analysis. Critical for understanding pricing and discount impact.
      fulfilled_mrp:
        type: DOUBLE
        description: Maximum retail price for the fulfilled portion of the order. Only
          populated when delivered_date is not null. Aggregated in metrics table for
          fulfillment revenue analysis. Used in cross-sell pharma analysis to calculate
          consultation value.
      fulfilled_discounted_mrp:
        type: DOUBLE
        description: Discounted price for the fulfilled portion of the order. Aggregated
          in metrics and dashboards. Used alongside fulfilled_mrp for revenue reconciliation.
      placed_wallet_burn:
        type: DOUBLE
        description: Wallet amount deducted at order placement. Aggregated in metrics table
          for payment method analysis. Used in daily mailer reports for financial metrics.
      placed_pld:
        type: DOUBLE
        description: Platform loyalty discount applied at order placement. Derived from
          parent_order_price_snapshot_discounts where type = 'ITEM_LEVEL'. Aggregated in
          metrics for discount analysis.
      placed_coupon_burn:
        type: DOUBLE
        description: Coupon discount applied at order placement. Derived from discounts
          where type = 'PROMOTIONAL'. Used in cross-sell analysis and daily mailer reports.
      fulfilled_wallet_burn:
        type: DOUBLE
        description: Wallet amount actually deducted upon fulfillment. Only populated
          when delivered_date is not null. Aggregated in metrics for fulfillment payment
          analysis.
      fulfilled_pld:
        type: DOUBLE
        description: Platform loyalty discount actually applied upon fulfillment. Aggregated
          in metrics table.
      fulfilled_coupon_burn:
        type: DOUBLE
        description: Coupon discount actually applied upon fulfillment. Aggregated in metrics
          and daily mailer reports.
      total_cashback:
        type: DOUBLE
        description: Total cashback earned on the order. Aggregated in financial reports.
      cancel_reason_text:
        type: VARCHAR
        description: Reason provided for order cancellation if applicable. Used in metrics
          table as a dimension for cancellation analysis. Filtered in RCA queries to
          understand cancellation patterns. Common values include 'Auto-Cancellation at TOMS',
          'cancelled by user', 'Doctor cancelled'.
      canceled_at:
        type: TIMESTAMP(3)
        description: Timestamp when the order was cancelled. Used in RCA analysis for
          timing analysis of cancellations.
      slotid:
        type: VARCHAR
        description: Unique identifier for the consultation time slot. Used in cross-sell
          analysis to link with appointment details. Referenced from commitments_appointmentdetail_slotid.
      slot_end_time:
        type: VARCHAR
        description: End time of the scheduled consultation slot. Used in cross-sell
          analysis to calculate time window for subsequent pharma orders (pharma orders
          placed within 2 days of slot_end_time). Converted to IST timestamp in pharma
          cross-sell queries.
      slot_start_time:
        type: VARCHAR
        description: Start time of the scheduled consultation slot. Used for slot timing
          analysis and appointment scheduling insights.
      consultation_type:
        type: VARCHAR
        description: Type of consultation (e.g., VIDEO, AUDIO). Used in daily mailer
          reports for consultation type breakdowns. Referenced from commitments_appointmentdetail_consultationtype.
      doctor_id:
        type: VARCHAR
        description: Unique identifier for the consulting doctor. Joined with teleconsultation_oms
          tables in base_query.sql. Used for doctor-level analysis and performance tracking.
      doctor_name:
        type: VARCHAR
        description: Name of the consulting doctor. Used as dimension in metrics table
          and dashboards for doctor-level breakdowns. Referenced in email reports and
          cross-sell analysis.
      doctor_type:
        type: VARCHAR
        description: Classification of doctor (e.g., GP, Specialist). Used extensively
          in metrics table and dashboards for doctor type segmentation. Aggregated in
          daily mailer reports and funnel analysis.
      doctor_specialization:
        type: VARCHAR
        description: Medical specialization of the doctor. Used in metrics table and
          dashboards for specialization-level analysis. Referenced in cross-sell pharma
          analysis.
      patient_name:
        type: VARCHAR
        description: Name of the patient (tokenized for privacy). Referenced from
          attributes_patient_name in base_query.sql. Used for patient-level analysis
          where privacy allows.
      patient_gender:
        type: VARCHAR
        description: Gender of the patient. Used in demographic analysis and patient
          segmentation.
      patient_age:
        type: VARCHAR
        description: Age of the patient. Used in daily mailer reports for age-based
          analysis. Referenced from teleconsultation_oms_order_group_orders_items.
      external_rx_id:
        type: VARCHAR
        description: External prescription identifier from the consultation. Critical
          for cross-sell analysis - used to join with rx_snapshot_nrt and rx_item_details
          to identify prescribed medications. Used in email reports to link consultations
          with prescribed items for overlap analysis with purchased pharma orders.
      child_order_status:
        type: VARCHAR(500)
        description: Status of child orders associated with the parent order. Derived
          from parent_order_price_snapshot snapshot_type (e.g., CHILD_ORDER_COMPLETED,
          CHILD_ORDER_CANCELLED). Used to determine order fulfillment status.
      order_created_flag:
        type: VARCHAR(500)
        description: Flag indicating whether order was successfully created in system
          ('1' = created, '0' or missing = not created). When not '1', the order is one for
          which payment was never triggered — exclude from analysis by default; only include
          when the user explicitly asks to include them or remove the filter. Used to classify
          order_category (Paid when = '1', Free when = '0' and placed_discounted_mrp = 0).
          Critical for filtering valid orders in daily mailer and cross-sell analysis.
      coupon_code:
        type: VARCHAR(500)
        description: Coupon code applied to the order if any. Extracted from discount
          attributes. Used in metrics table as dimension for coupon performance analysis.
          Used to identify diag_x_consult_flag (when coupon_code LIKE 'CON%' and placed_discounted_mrp = 0).
      reg_month:
        type: VARCHAR(500)
        description: Month when the customer registered (truncated to month). Used to
          classify reg_status (New if reg_month = order month, Old otherwise). Joined
          with customer_segmentation_raw_data in base_query.sql.
      loyalty_status:
        type: VARCHAR(500)
        description: Customer's enrollment status in loyalty program. Mapped from loyalty_enrolled
          in clevertap_user_properties_oms. Used in metrics table and dashboards for
          loyalty segment analysis.
      latest_order_city:
        type: VARCHAR(500)
        description: City where the customer placed their latest order. Derived from
          COALESCE(latest_placed_delivery_city, latest_fulfilled_diag_city) in base_query.sql.
          Used for geographic analysis.
      reg_status:
        type: VARCHAR(500)
        description: Registration status of the customer (e.g., Old, New). Classified
          based on reg_month vs order month. Used in metrics table and dashboards for
          new vs existing customer analysis.
      pe_status:
        type: VARCHAR(500)
        description: Patient engagement status (RNB, Old, New). Classified based on
          registration date and first order dates. Used in metrics table for patient
          lifecycle analysis.
      pharma_status:
        type: VARCHAR(500)
        description: Customer's pharmacy purchase history status (Pharma_New, Pharma_Old,
          null). Classified based on first_pharma_month vs order month. Used in metrics
          table for cross-sell analysis and customer segmentation.
      diag_status:
        type: VARCHAR(500)
        description: Customer's diagnostics service usage status (Diag_New, Diag_Old,
          null). Classified based on first_diag_month vs order month. Used in metrics
          table for cross-sell analysis.
      consult_status:
        type: VARCHAR(500)
        description: Customer's consultation service usage status (Consult New, Consult
          Old). Classified based on first_consult_date vs order date. Used in metrics
          table and dashboards for consultation customer lifecycle analysis.
      digi_flag:
        type: INTEGER
        description: Flag indicating digital/online consultation (1=yes, 0=no). Derived
          from digi_dashboard table join in base_query.sql. Used in metrics table and
          dashboards for digital vs non-digital consultation analysis.
      crosssold_status:
        type: VARCHAR(500)
        description: Status of cross-selling attempts (e.g., New, Old). Classified
          based on whether customer had previous pharma or diag orders. Used in cross-sell
          analysis.
      user_activity_segment:
        type: VARCHAR(500)
        description: Customer activity segment classification (e.g., Active, Dormant_60_90_days,
          Dormant_181_365_days, Churned_>365_days, Never Ordered). Classified based
          on last_order_date relative to order date. Used in metrics table and dashboards
          for churn and retention analysis.
      month:
        type: INTEGER
        description: Month of the order placement (1-12). Used for monthly aggregations
          and time-based analysis.
      week_start:
        type: DATE
        description: Start date of the week containing the order. Calculated using date_sub
          and dayofweek functions. Used for weekly aggregations in dashboards.
      isfreefollowupavailable:
        type: VARCHAR
        description: Flag indicating if free follow-up consultation is available ('true',
          'false'). Used in order_category classification (FreeFollowup when = 'true'
          and pastconsultationorderid is not null). Referenced from child_order_snapshot
          attributes JSON.
      pastconsultationorderid:
        type: VARCHAR
        description: Order ID of previous consultation if applicable. Used to identify
          follow-up consultations. Critical for FreeFollowup order classification in
          daily mailer reports.
      dt:
        type: DATE
        description: Data load date or partition date. Always filter on this column
          for query performance. Used in all queries for date-based filtering (typically
          dt >= date_sub(current_date, N) or dt >= trunc(add_months(current_date, -N), 'MM')).
