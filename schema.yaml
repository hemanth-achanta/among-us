  hive.pre_analytics.doc_consult_metrics:
    description: Pre-aggregated order-level metrics table with multi-dimensional breakdowns.
      Created from doc_consult_orders with aggregations at Day, Week, and Month frequencies.
      Contains pre-computed counts (completed/cancelled/total orders, appointments) and
      revenue metrics (MRP, discounted MRP, wallet burn) aggregated by various dimensions
      (doctor, customer type, order source, consultation status, etc.). Optimized for
      dashboard queries and high-level reporting. Used for KPIs, trend analysis, and
      cohort breakdowns without requiring real-time aggregations.
    layer: semi
    subject: consultations
    columns:
      dt:
        type: DATE
        description: Date of the consultation metric record. Can represent day, week start,
          or month start depending on freq. Always filter on this column for query performance.
          Used in all dashboard queries for time-based filtering.
      freq:
        type: VARCHAR
        description: Frequency level of the data aggregation ('Day', 'Week', 'Month').
          Used to switch between daily, weekly, and monthly views in dashboards. Created
          via UNION ALL in doc_consult.sql from same base data aggregated at different
          time granularities.
      customer_type:
        type: VARCHAR
        description: Customer acquisition cohort or lifecycle stage (e.g., '60D Acquisition',
          'Active', 'Dormant 60-120', 'Dormant 120-180', 'Dormant 180-360', 'Dormant 360+').
          Derived from fod_lod_growth_cohort join in doc_consult.sql. Used for cohort
          analysis and customer lifecycle reporting.
      loyalty_flag:
        type: VARCHAR
        description: Indicator of whether customer has loyalty program membership ('1'
          = enrolled, '0' = not enrolled). Derived from con_ret_loyalty_base join. Used
          in dashboards for loyalty segment analysis.
      cancel_reason_text:
        type: VARCHAR
        description: Reason provided for consultation or appointment cancellation. Used
          as dimension for cancellation analysis. Aggregated to understand cancellation
          patterns and root causes.
      doctor_type:
        type: VARCHAR
        description: Classification of doctor (e.g., GP, Specialist). Used extensively
          in dashboards for doctor type breakdowns. Aggregated metrics allow comparison
          of performance across doctor types.
      user_type_monthly:
        type: VARCHAR(500)
        description: User engagement classification based on monthly activity and order
          fulfillment status (e.g., 'Placed_but_not_fulfilled'). Derived from f_order_consumer
          join in doc_consult.sql. Used for user engagement analysis.
      user_type:
        type: VARCHAR(500)
        description: User classification indicating whether customer is new or existing
          ('New', 'Old'). Derived from fod_lod_growth_cohort join. Used in dashboards
          for new vs existing customer analysis.
      doctor_name:
        type: VARCHAR
        description: Name of the consulting doctor. Used as dimension in dashboards for
          doctor-level performance analysis. Allows drill-down to individual doctor metrics.
      order_id:
        type: VARCHAR
        description: Unique identifier for the consultation order. Maintains order-level
          granularity in metrics table. Used to join back to doc_consult_orders for
          detailed analysis. Enables order-level drill-down from aggregated dashboards.
      customer_id:
        type: VARCHAR
        description: Unique identifier for the customer. Used for customer-level analysis
          and cohort tracking. Enables customer journey analysis across orders.
      order_category:
        type: VARCHAR
        description: Type of consultation order ('Free', 'Paid', 'FreeFollowup'). Classified
          based on order_created_flag and placed_discounted_mrp in doc_consult.sql. Used
          in dashboards to understand order mix and revenue composition.
      order_source:
        type: VARCHAR
        description: Channel through which the order was placed (e.g., Mobile_Website,
          Android_App, iOS_App). Used in dashboards for channel performance analysis.
          Aggregated metrics show conversion and revenue by channel.
      coupon_code:
        type: VARCHAR(500)
        description: Promotional or discount code applied to the order. Used as dimension
          for coupon performance analysis. Allows tracking of promotional campaign effectiveness.
      doctor_specialization:
        type: VARCHAR
        description: Medical specialty of the consulting doctor. Used in dashboards for
          specialization-level analysis. Enables understanding of demand by medical
          specialty.
      consult_status:
        type: VARCHAR(500)
        description: Status of the consultation (e.g., 'Consult New', 'Consult Old').
          Indicates whether this is customer's first consultation or repeat. Used for
          customer lifecycle and retention analysis.
      pharma_status:
        type: VARCHAR(500)
        description: Status of pharmacy-related services associated with the consultation
          ('Pharma_New', 'Pharma_Old', null). Used for cross-sell analysis to understand
          consultation impact on pharma orders.
      diag_status:
        type: VARCHAR(500)
        description: Status of diagnostic services associated with the consultation ('Diag_New',
          'Diag_Old', null). Used for cross-sell analysis to understand consultation
          impact on diagnostic orders.
      user_activity_segment:
        type: VARCHAR(500)
        description: Customer engagement segment based on activity level and churn status
          (e.g., 'Active', 'Dormant_60_90_days', 'Churned_>365_days'). Used for retention
          and churn analysis in dashboards.
      pe_status:
        type: VARCHAR
        description: Physical examination status ('New', 'Old', 'RNB'). Used for patient
          engagement analysis.
      digi_flag:
        type: INTEGER
        description: Binary indicator of whether the consultation was digital or online
          (1=digital, 0=non-digital). Used in dashboards for digital vs traditional consultation
          analysis.
      completed_consult_orders:
        type: BIGINT
        description: Count of successfully completed consultation orders. Pre-aggregated
          metric used in dashboards for completion rate calculations. Derived from COUNT(DISTINCT
          CASE WHEN order_status = 'COMPLETED' THEN order_id END) in doc_consult.sql.
      total_consult_orders:
        type: BIGINT
        description: Total number of consultation orders placed. Pre-aggregated metric
          for order volume analysis. Used in dashboards for trend analysis and conversion
          rate denominators.
      cancelled_consult_orders:
        type: BIGINT
        description: Count of cancelled consultation orders. Pre-aggregated metric for
          cancellation analysis. Used in dashboards to understand cancellation rates
          and patterns.
      no_of_booked_appointments:
        type: BIGINT
        description: Total number of appointments booked. Pre-aggregated metric for appointment
          volume. Derived from COUNT(DISTINCT CASE WHEN order_id IS NOT NULL THEN order_id
          END) in doc_consult.sql.
      no_of_cancelled_appointments:
        type: BIGINT
        description: Total number of appointments cancelled. Pre-aggregated metric for
          cancellation tracking.
      no_of_completed_appointments:
        type: BIGINT
        description: Total number of appointments completed. Pre-aggregated metric for
          completion tracking. Typically equals completed_consult_orders.
      placed_mrp:
        type: BIGINT
        description: Maximum retail price of consultations placed. Pre-aggregated revenue
          metric (SUM of placed_mrp from orders). Used in dashboards for revenue analysis
          and trend tracking.
      placed_discounted_mrp:
        type: BIGINT
        description: Discounted price of consultations placed. Pre-aggregated revenue
          metric. Used in dashboards to understand discount impact and net revenue.
      placed_wallet_burn:
        type: BIGINT
        description: Wallet or credit amount used for consultations placed. Pre-aggregated
          payment method metric. Used in financial analysis to understand payment mix.
      fulfilled_mrp:
        type: BIGINT
        description: Maximum retail price of consultations fulfilled. Pre-aggregated
          fulfillment revenue metric. Used in dashboards for fulfillment revenue analysis.
      fulfilled_discounted_mrp:
        type: BIGINT
        description: Discounted price of consultations fulfilled. Pre-aggregated fulfillment
          revenue metric. Used for net fulfillment revenue analysis.
      fulfilled_wallet_burn:
        type: BIGINT
        description: Wallet or credit amount used for consultations fulfilled. Pre-aggregated
          fulfillment payment metric. Used in financial analysis.
    sample_rows:
